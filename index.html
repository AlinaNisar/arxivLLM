<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexTalent | Advanced AI ATS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glow-green { box-shadow: 0 0 10px #22c55e; }
        .glow-indigo { box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 h-screen flex flex-col overflow-hidden select-none">

    <div id="toastNotification" class="fixed top-5 right-5 z-50 transform translate-x-80 opacity-0 transition-all duration-300 ease-out bg-slate-800 border-l-4 border-indigo-500 text-slate-200 px-4 py-3 rounded-lg shadow-xl flex items-center space-x-3 pointer-events-none">
        <span id="toastIcon" class="text-indigo-400"></span>
        <span id="toastMessage" class="text-xs font-medium">Notification Message</span>
    </div>

    <header class="bg-slate-950/80 border-b border-slate-800 px-6 py-3.5 flex justify-between items-center z-10 shrink-0 backdrop-blur">
        <div class="flex items-center space-x-3">
            <div class="h-8 w-8 rounded-lg bg-indigo-600 flex items-center justify-center font-bold text-white tracking-wider text-xs">ATS</div>
            <h1 class="text-md font-bold tracking-tight text-slate-200">Apex<span class="text-indigo-400 font-normal">Talent</span></h1>
        </div>
        <div class="flex items-center space-x-3 bg-slate-900 p-1.5 rounded-xl border border-slate-850 w-96 shadow-inner">
            <input type="password" id="apiKeyInput" placeholder="Enter Gemini API Key..." class="bg-transparent text-xs text-slate-300 px-3 py-1.5 w-full focus:outline-none" />
            <button onclick="connectAPI()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-semibold px-4 py-1.5 rounded-lg transition-all active:scale-95 whitespace-nowrap">Connect</button>
            <span id="apiStatusIndicator" class="h-2.5 w-2.5 rounded-full bg-slate-700 transition-all duration-300"></span>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden w-full">
        <section class="w-1/4 bg-slate-900 border-r border-slate-800 p-5 flex flex-col justify-between overflow-y-auto custom-scrollbar">
            <div class="space-y-6">
                <div>
                    <h2 class="text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-2.5">1. Target Framework (JD)</h2>
                    <label class="flex flex-col items-center justify-center border border-dashed border-slate-800 hover:border-indigo-500/50 rounded-xl p-4 cursor-pointer bg-slate-950/40 transition-all group">
                        <span class="text-xs text-slate-400 font-medium truncate w-full" id="jdName">Upload Job Description</span>
                        <input type="file" id="jdFile" class="hidden" accept=".pdf,.txt" onchange="updateFileName('jdFile', 'jdName')" />
                    </label>
                </div>
                <div>
                    <h2 class="text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-2.5">2. Candidate Resumes</h2>
                    <label class="flex flex-col items-center justify-center border border-dashed border-slate-800 hover:border-indigo-500/50 rounded-xl p-5 cursor-pointer bg-slate-950/40 transition-all group">
                        <span class="text-xs text-slate-400 font-medium" id="resumeCount">Upload Resumes (Multi-PDF)</span>
                        <input type="file" id="resumeFiles" class="hidden" accept=".pdf,.txt" multiple onchange="registerResumes()" />
                    </label>
                </div>
            </div>

            <div class="mt-auto pt-6 space-y-3">
                <div id="progressContainer" class="hidden">
                    <div class="text-[10px] text-slate-500 mb-1">Parsing Progress</div>
                    <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
                        <div id="progressBar" class="h-full bg-indigo-500 w-0 transition-all duration-300"></div>
                    </div>
                </div>
                <button onclick="generateInterviewQuestions()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl font-medium text-xs border border-slate-700 transition">Generate Interview Questions</button>
                <button onclick="processApplications()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-medium tracking-wide text-xs transition shadow-lg shadow-indigo-600/10 active:scale-95">Execute Batch AI Parsing</button>
            </div>
        </section>

        <section id="centerPanel" class="w-2/4 p-6 overflow-y-auto custom-scrollbar flex flex-col bg-slate-950/20 relative">
            <div id="tabbedDashboardContainer" class="flex flex-col h-full flex-1">
                <div class="flex justify-between items-center mb-5 shrink-0">
                    <div class="flex bg-slate-900 border border-slate-800 p-1 rounded-xl">
                        <button id="tabRankingsBtn" onclick="switchMainTab('rankings')" class="px-4 py-2 text-xs font-semibold rounded-lg bg-indigo-600 text-white">Rankings</button>
                        <button id="tabLibraryBtn" onclick="switchMainTab('library')" class="px-4 py-2 text-xs font-semibold rounded-lg text-slate-400">Library</button>
                        <button id="tabInterviewBtn" onclick="switchMainTab('interview')" class="px-4 py-2 text-xs font-semibold rounded-lg text-slate-400">Interview Qs</button>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="range" id="filterRange" min="0" max="100" value="0" oninput="applyFilter()" class="h-1 w-24 accent-indigo-500">
                        <button onclick="downloadCSV()" class="bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded text-[10px] text-slate-300 border border-slate-700">Export CSV</button>
                    </div>
                </div>

                <div id="rankingsTabContent" class="bg-slate-900/40 border border-slate-800 rounded-xl overflow-hidden flex-1 flex flex-col">
                    <table class="w-full text-left">
                        <thead class="bg-slate-900 border-b border-slate-800"><tr class="text-[11px] text-slate-500"><th class="py-3 px-4">Applicant</th><th class="py-3 text-right pr-4">Match %</th></tr></thead>
                        <tbody id="rankingTableBody" class="divide-y divide-slate-850/60 text-xs"></tbody>
                    </table>
                </div>

                <div id="libraryTabContent" class="hidden flex-1 overflow-y-auto custom-scrollbar"></div>
                
                <div id="interviewTabContent" class="hidden flex-1 overflow-y-auto custom-scrollbar p-4 bg-slate-900/40 border border-slate-800 rounded-xl">
                    <div id="interviewQuestionsList" class="space-y-4"></div>
                </div>
            </div>

            <div id="previewContainer" class="hidden flex-col h-full flex-1"></div>
            <div id="analysisContainer" class="hidden flex-col h-full flex-1"></div>
        </section>

        <section class="w-1/4 bg-slate-900 border-l border-slate-800 flex flex-col overflow-hidden">
            <div id="chatContainer" class="flex-1 p-4 space-y-3 overflow-y-auto text-xs custom-scrollbar"></div>
            <div class="p-4 border-t border-slate-800"><input type="text" id="chatInput" placeholder="Ask about candidates..." class="w-full bg-slate-950 p-2 text-xs rounded-lg border border-slate-800 focus:outline-none" onkeypress="if(event.key === 'Enter') sendChatMessage()" /></div>
        </section>
    </main>

    <script type="module">
        import { GoogleGenAI } from 'https://esm.run/@google/genai';
        let ai = null;
        let globalContext = [];
        window.uploadedResumes = [];
        window.analyticsCache = {};

        window.connectAPI = () => {
            const key = document.getElementById('apiKeyInput').value.trim();
            if(!key) return;
            ai = new GoogleGenAI({ apiKey: key });
            document.getElementById('apiStatusIndicator').className = "h-2.5 w-2.5 rounded-full bg-green-500 glow-green";
        };

        window.applyFilter = () => {
            const min = document.getElementById('filterRange').value;
            const filtered = globalContext.filter(item => item.percentage >= min);
            renderRankingsTable(filtered);
        };

        function renderRankingsTable(data) {
            const body = document.getElementById('rankingTableBody');
            body.innerHTML = data.map(c => `
                <tr class="hover:bg-slate-800/30">
                    <td class="py-3 px-4 font-medium">${c.name}</td>
                    <td class="py-3 text-right pr-4 text-emerald-400 font-bold">${c.percentage}%</td>
                </tr>`).join('');
        }

        window.downloadCSV = () => {
            let csv = "Name,Percentage\n" + globalContext.map(r => `${r.name},${r.percentage}`).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'rankings.csv'; a.click();
        };

        window.generateInterviewQuestions = async () => {
            if(!ai) return alert("Connect API First");
            const jd = document.getElementById('jdFile').files[0];
            if(!jd) return alert("Upload JD");
            
            const list = document.getElementById('interviewQuestionsList');
            list.innerHTML = "Generating 20 questions via AI...";
            switchMainTab('interview');

            const text = await jd.text();
            const res = await ai.models.generateContent({
                model: 'gemini-2.5-flash',
                contents: `Create 20 interview questions and brief answers based on this JD: ${text}`
            });
            list.innerHTML = `<pre class="whitespace-pre-wrap text-xs">${res.text}</pre>`;
        };

        window.switchMainTab = (tab) => {
            document.getElementById('rankingsTabContent').classList.toggle('hidden', tab !== 'rankings');
            document.getElementById('libraryTabContent').classList.toggle('hidden', tab !== 'library');
            document.getElementById('interviewTabContent').classList.toggle('hidden', tab !== 'interview');
        };

        window.processApplications = async () => {
            if(!ai) return;
            const pb = document.getElementById('progressBar');
            document.getElementById('progressContainer').classList.remove('hidden');
            pb.style.width = '30%';
            
            // Simulation/Logic for batch processing
            // ... (Replace with your parsing logic)
            pb.style.width = '100%';
            // Populate globalContext and call renderRankingsTable
        };

        // ... (Keep existing UI helper functions)
    </script>
</body>
</html>
