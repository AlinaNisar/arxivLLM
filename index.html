<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimalist Notebook</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts for typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons for minimalist iconography -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* Custom Tailwind Configuration */
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    },
                    colors: {
                        stone: {
                            50: '#fafaf9',
                            100: '#f5f5f4',
                            200: '#e7e5e4',
                            300: '#d6d3d1',
                            400: '#a8a29e',
                            800: '#292524',
                            900: '#1c1917',
                        }
                    }
                }
            }
        }
    </style>
    <style>
        /* Base styles and minimal scrollbar */
        body {
            background-color: #fafaf9; /* stone-50 */
            color: #1c1917; /* stone-900 */
            overflow: hidden; /* Prevent body scroll, handle inside panels */
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d6d3d1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a29e;
        }

        /* Hide elements cleanly */
        .hidden-mobile {
            display: none !important;
        }
        @media (min-width: 768px) {
            .hidden-mobile {
                display: flex !important;
            }
            .mobile-only {
                display: none !important;
            }
        }

        /* Editor textarea specific styles */
        textarea {
            resize: none;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        textarea::-webkit-scrollbar {
            display: none;
        }
        
        .note-transition {
            transition: background-color 0.2s ease, transform 0.1s ease;
        }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="h-screen w-full flex font-sans antialiased text-stone-800">

    <!-- Sidebar / Note List -->
    <aside id="sidebar" class="w-full md:w-80 h-full border-r border-stone-200 bg-stone-50/50 flex flex-col absolute md:relative z-20 transition-transform duration-300 transform translate-x-0 md:translate-x-0 bg-stone-50 md:bg-transparent">
        
        <!-- Sidebar Header -->
        <div class="h-16 flex items-center justify-between px-6 border-b border-stone-200 shrink-0">
            <h1 class="text-lg font-medium text-stone-800 tracking-tight">Notes</h1>
            <button id="new-note-btn" class="p-2 -mr-2 text-stone-400 hover:text-stone-800 transition-colors rounded-full hover:bg-stone-200/50 focus:outline-none" aria-label="Create New Note">
                <i class="ph ph-plus text-xl"></i>
            </button>
        </div>

        <!-- Search Bar (Optional minimalist addition) -->
        <div class="px-4 py-3 border-b border-stone-200 shrink-0">
            <div class="relative">
                <i class="ph ph-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-stone-400"></i>
                <input type="text" id="search-input" placeholder="Search..." class="w-full bg-stone-200/50 text-stone-700 text-sm rounded-lg pl-9 pr-4 py-2 focus:outline-none focus:ring-2 focus:ring-stone-300 focus:bg-white transition-all placeholder:text-stone-400">
            </div>
        </div>

        <!-- Notes List Container -->
        <div id="notes-list" class="flex-1 overflow-y-auto p-3 space-y-1">
            <!-- Notes will be injected here via JS -->
        </div>
    </aside>

    <!-- Main Editor Area -->
    <main id="editor-container" class="flex-1 h-full flex flex-col bg-white relative z-10 w-full hidden-mobile">
        
        <!-- Editor Header (Mobile Menu & Actions) -->
        <header class="h-16 flex items-center justify-between px-4 md:px-8 border-b border-stone-100 shrink-0">
            <div class="flex items-center gap-4">
                <button id="menu-btn" class="p-2 -ml-2 text-stone-400 hover:text-stone-800 transition-colors md:hidden focus:outline-none rounded-full hover:bg-stone-50" aria-label="Open Notes List">
                    <i class="ph ph-list text-xl"></i>
                </button>
                <span id="save-status" class="text-xs text-stone-400 font-medium tracking-wide hidden">Saved</span>
            </div>
            
            <button id="delete-note-btn" class="p-2 text-stone-400 hover:text-red-500 transition-colors focus:outline-none rounded-full hover:bg-red-50 hidden" aria-label="Delete Note" title="Delete Note">
                <i class="ph ph-trash text-xl"></i>
            </button>
        </header>

        <!-- Empty State (Shown when no note is selected) -->
        <div id="empty-state" class="flex-1 flex flex-col items-center justify-center text-stone-400 p-8 hidden">
            <i class="ph ph-notebook text-6xl mb-4 opacity-50"></i>
            <p class="text-sm font-medium tracking-wide">Select a note or create a new one.</p>
        </div>

        <!-- Active Note Editor -->
        <div id="active-editor" class="flex-1 flex flex-col hidden overflow-hidden px-6 md:px-12 max-w-4xl mx-auto w-full">
            <input 
                type="text" 
                id="note-title-input" 
                placeholder="Note Title" 
                class="w-full text-3xl md:text-4xl font-semibold text-stone-800 placeholder:text-stone-300 border-none outline-none bg-transparent pt-10 pb-6 focus:ring-0"
                autocomplete="off"
            >
            <div class="flex items-center gap-4 text-xs text-stone-400 pb-6 mb-2 border-b border-stone-100">
                <span id="note-date-display" class="flex items-center gap-1.5"><i class="ph ph-calendar-blank"></i> <span id="date-text"></span></span>
                <span id="note-words-display" class="flex items-center gap-1.5"><i class="ph ph-text-align-left"></i> <span id="word-count">0 words</span></span>
            </div>
            <textarea 
                id="note-body-input" 
                placeholder="Start writing..." 
                class="w-full flex-1 text-base md:text-lg text-stone-700 leading-relaxed font-serif placeholder:text-stone-300 border-none outline-none bg-transparent pb-12 focus:ring-0"
                spellcheck="false"
            ></textarea>
        </div>
    </main>

    <script>
        // --- Data & State Management ---
        const STORAGE_KEY = 'minimal_notebook_data';
        
        let notes = [];
        let activeNoteId = null;
        let saveTimeout = null;
        let searchQuery = '';

        // DOM Elements
        const notesListEl = document.getElementById('notes-list');
        const newNoteBtn = document.getElementById('new-note-btn');
        const searchInput = document.getElementById('search-input');
        
        const editorContainer = document.getElementById('editor-container');
        const sidebar = document.getElementById('sidebar');
        const menuBtn = document.getElementById('menu-btn');
        
        const emptyStateEl = document.getElementById('empty-state');
        const activeEditorEl = document.getElementById('active-editor');
        const titleInput = document.getElementById('note-title-input');
        const bodyInput = document.getElementById('note-body-input');
        const deleteBtn = document.getElementById('delete-note-btn');
        const saveStatus = document.getElementById('save-status');
        const dateText = document.getElementById('date-text');
        const wordCount = document.getElementById('word-count');

        // --- Core Functions ---

        // Load notes from Local Storage
        function loadNotes() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    notes = JSON.parse(stored);
                    // Sort by newest first
                    notes.sort((a, b) => b.updatedAt - a.updatedAt);
                } catch (e) {
                    console.error("Failed to parse notes", e);
                    notes = [];
                }
            } else {
                // Initial welcome note
                const welcomeNote = {
                    id: generateId(),
                    title: 'Welcome to your minimalist notebook',
                    body: 'This is a clean, distraction-free space for your thoughts.\n\n- Everything is saved automatically to your browser.\n- Your notes stay private and offline.\n- Works beautifully on mobile and desktop.\n\nStart writing...',
                    createdAt: Date.now(),
                    updatedAt: Date.now()
                };
                notes = [welcomeNote];
                saveNotes();
            }
        }

        // Save notes to Local Storage
        function saveNotes() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
        }

        // Generate simple unique ID
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substring(2);
        }

        // Format Date
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return new Intl.DateTimeFormat('en-US', { 
                month: 'short', 
                day: 'numeric', 
                year: date.getFullYear() !== new Date().getFullYear() ? 'numeric' : undefined 
            }).format(date);
        }

        // Get word count
        function getWordCount(text) {
            return text.trim() ? text.trim().split(/\s+/).length : 0;
        }

        // --- UI Rendering ---

        // Render the sidebar list
        function renderSidebar() {
            notesListEl.innerHTML = '';
            
            const filteredNotes = notes.filter(n => {
                const searchLower = searchQuery.toLowerCase();
                return n.title.toLowerCase().includes(searchLower) || n.body.toLowerCase().includes(searchLower);
            });

            if (filteredNotes.length === 0) {
                notesListEl.innerHTML = `
                    <div class="text-center py-8 text-stone-400 text-sm">
                        ${searchQuery ? 'No notes found.' : 'No notes yet.'}
                    </div>
                `;
                return;
            }

            filteredNotes.forEach(note => {
                const noteEl = document.createElement('div');
                const isActive = note.id === activeNoteId;
                
                // Get a preview snippet
                let snippet = note.body.replace(/\n/g, ' ').trim();
                if (snippet.length > 80) snippet = snippet.substring(0, 80) + '...';
                if (!snippet) snippet = 'No additional text';

                noteEl.className = `note-transition p-3 rounded-xl cursor-pointer group border ${isActive ? 'bg-white border-stone-200 shadow-sm' : 'bg-transparent border-transparent hover:bg-stone-200/40'}`;
                
                noteEl.innerHTML = `
                    <div class="flex justify-between items-baseline mb-1">
                        <h3 class="font-medium text-sm text-stone-800 truncate pr-2 ${!note.title ? 'italic text-stone-500' : ''}">
                            ${note.title || 'Untitled Note'}
                        </h3>
                    </div>
                    <p class="text-xs text-stone-500 line-clamp-2 leading-relaxed font-serif">${snippet}</p>
                    <div class="mt-2 text-[10px] font-medium text-stone-400 uppercase tracking-wider">
                        ${formatDate(note.updatedAt)}
                    </div>
                `;

                noteEl.addEventListener('click', () => {
                    selectNote(note.id);
                    // On mobile, switch to editor view
                    if (window.innerWidth < 768) {
                        sidebar.classList.add('hidden-mobile');
                        editorContainer.classList.remove('hidden-mobile');
                    }
                });

                notesListEl.appendChild(noteEl);
            });
        }

        // Render the editor area based on active note
        function renderEditor() {
            if (!activeNoteId) {
                emptyStateEl.classList.remove('hidden');
                activeEditorEl.classList.add('hidden');
                deleteBtn.classList.add('hidden');
                return;
            }

            const note = notes.find(n => n.id === activeNoteId);
            if (!note) return;

            emptyStateEl.classList.add('hidden');
            activeEditorEl.classList.remove('hidden');
            deleteBtn.classList.remove('hidden');

            // Prevent cursor jumping by only updating if different (mainly for when called not by user input)
            if (titleInput.value !== note.title) titleInput.value = note.title;
            if (bodyInput.value !== note.body) bodyInput.value = note.body;
            
            dateText.textContent = formatDate(note.updatedAt);
            wordCount.textContent = `${getWordCount(note.body)} word${getWordCount(note.body) !== 1 ? 's' : ''}`;
        }

        // --- User Actions ---

        function createNote() {
            const newNote = {
                id: generateId(),
                title: '',
                body: '',
                createdAt: Date.now(),
                updatedAt: Date.now()
            };
            
            notes.unshift(newNote); // Add to beginning
            saveNotes();
            
            searchQuery = '';
            searchInput.value = '';
            
            selectNote(newNote.id);
            
            // On mobile, switch to editor
            if (window.innerWidth < 768) {
                sidebar.classList.add('hidden-mobile');
                editorContainer.classList.remove('hidden-mobile');
            }

            // Focus title
            setTimeout(() => titleInput.focus(), 50);
        }

        function selectNote(id) {
            activeNoteId = id;
            renderSidebar();
            renderEditor();
        }

        function deleteActiveNote() {
            if (!activeNoteId) return;
            
            // Custom elegant confirmation (avoiding standard alert/confirm)
            // Using a simple custom modal logic inline for simplicity, but for true minimalism just delete with undo or immediate.
            // Let's implement immediate delete, select next note.
            const index = notes.findIndex(n => n.id === activeNoteId);
            notes.splice(index, 1);
            saveNotes();
            
            activeNoteId = notes.length > 0 ? notes[Math.min(index, notes.length - 1)].id : null;
            
            renderSidebar();
            renderEditor();

            // On mobile, if no notes left, go back to sidebar
            if (window.innerWidth < 768 && !activeNoteId) {
                sidebar.classList.remove('hidden-mobile');
                editorContainer.classList.add('hidden-mobile');
            }
        }

        // Handle auto-saving on input
        function handleInput() {
            if (!activeNoteId) return;
            
            const note = notes.find(n => n.id === activeNoteId);
            if (!note) return;

            note.title = titleInput.value;
            note.body = bodyInput.value;
            note.updatedAt = Date.now();

            // Re-sort notes to bring updated to top
            notes.sort((a, b) => b.updatedAt - a.updatedAt);

            // Update UI elements instantly
            wordCount.textContent = `${getWordCount(note.body)} word${getWordCount(note.body) !== 1 ? 's' : ''}`;
            dateText.textContent = formatDate(note.updatedAt);

            // Debounce actual save and sidebar re-render for performance
            clearTimeout(saveTimeout);
            
            saveStatus.classList.remove('hidden');
            saveStatus.textContent = 'Saving...';
            
            saveTimeout = setTimeout(() => {
                saveNotes();
                renderSidebar();
                saveStatus.textContent = 'Saved';
                setTimeout(() => { saveStatus.classList.add('hidden'); }, 2000);
            }, 500);
        }

        // --- Event Listeners Setup ---

        // Init
        window.addEventListener('DOMContentLoaded', () => {
            loadNotes();
            
            // Select first note by default on desktop
            if (notes.length > 0 && window.innerWidth >= 768) {
                activeNoteId = notes[0].id;
            }
            
            renderSidebar();
            renderEditor();
        });

        // Search
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderSidebar();
        });

        // Editor inputs
        titleInput.addEventListener('input', handleInput);
        bodyInput.addEventListener('input', handleInput);

        // Buttons
        newNoteBtn.addEventListener('click', createNote);
        deleteBtn.addEventListener('click', deleteActiveNote);

        // Mobile Menu Toggle (Back to list)
        menuBtn.addEventListener('click', () => {
            sidebar.classList.remove('hidden-mobile');
            editorContainer.classList.add('hidden-mobile');
        });

        // Handle resizing properly (reset mobile views if scaling up)
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768) {
                sidebar.classList.remove('hidden-mobile');
                editorContainer.classList.remove('hidden-mobile');
                
                // Ensure a note is selected if none is
                if (!activeNoteId && notes.length > 0) {
                    selectNote(notes[0].id);
                }
            } else {
                // On mobile, decide which view to show based on active note state
                // (Simple logic: if resizing down, default to list if no active, else editor)
                if (activeNoteId) {
                    sidebar.classList.add('hidden-mobile');
                    editorContainer.classList.remove('hidden-mobile');
                } else {
                    sidebar.classList.remove('hidden-mobile');
                    editorContainer.classList.add('hidden-mobile');
                }
            }
        });

    </script>
</body>
</html>
